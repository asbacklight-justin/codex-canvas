name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Test Go code
        run: go test ./...
      - name: Cross-compile Windows x64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: >-
          go build -buildvcs=false -trimpath
          -tags desktop,wv2runtime.download,production
          -ldflags "-w -s -H windowsgui"
          -o /tmp/Codex-Canvas.exe .
      - name: Check macOS build script
        run: bash -n scripts/build-macos.sh scripts/build-windows.sh
