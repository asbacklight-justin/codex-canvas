name: Bug report / 错误报告
description: Report a reproducible problem / 报告可复现问题
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove private prompts, conversations, file paths, and tokens. / 请删除隐私提示词、对话、文件路径和令牌。
  - type: input
    id: version
    attributes:
      label: Codex Canvas version / 版本
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment / 环境
      placeholder: macOS version, Intel or Apple Silicon, Codex version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps / 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true
